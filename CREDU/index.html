<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CREDU | Credenciales Uniagustiniana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-graduates">
        <div class="birrete birrete-1">🎓</div>
        <div class="birrete birrete-2">🎓</div>
        <div class="birrete birrete-3">🎓</div>
        <div class="birrete birrete-4">🎓</div>
        <div class="birrete birrete-5">🎓</div>
        <div class="birrete birrete-6">🎓</div>
        <div class="birrete birrete-7">🎓</div>
        <div class="birrete birrete-8">🎓</div>
        <div class="birrete birrete-9">🎓</div>
        <div class="birrete birrete-10">🎓</div>
    </div>

    <div class="container-wrapper">
        <div class="container">
            <div class="header">
                <div class="logo-container">
                    <img src="imagenes/Escudo-uniagustiniana.png" alt="Escudo" class="escudo" onerror="this.style.display='none'">
                </div>
                <h1>CREDU</h1>
                <p>Sistema de Credenciales Institucionales</p>
                <div class="lema">🔒 Uniagustiniana es creer en ti</div>
            </div>

            <div class="card">
                <h2>Acceso Docentes</h2>
                <p>Ingresa con tu correo institucional</p>
                
                <input type="email" id="email" placeholder="nombre.apellido@uniagustiniana.edu.co">
                <button id="btnIngresar">Ingresar</button>
                
                <div id="errorMsg" class="error-message"></div>
            </div>

            <div class="footer">
                <p>Uniagustiniana - Tecnologías de la Información</p>
            </div>
        </div>
    </div>

    <script src="registros.js"></script>
    <script src="registros.js"></script>
</body>
</html>

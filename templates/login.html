<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREDU · Acceso Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a1f3e 0%, #0e2d5a 50%, #0a1f3e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
    }

    /* Fondo con patrón de puntos */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(rgba(212, 175, 55, 0.08) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
    }

    /* Círculos decorativos */
    .bg-circle {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.1), transparent);
        pointer-events: none;
    }

    .circle-1 {
        width: 300px;
        height: 300px;
        top: -100px;
        right: -100px;
    }

    .circle-2 {
        width: 250px;
        height: 250px;
        bottom: -80px;
        left: -80px;
    }

    .login-card {
        position: relative;
        width: 100%;
        max-width: 460px;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        border-radius: 40px;
        padding: 48px 40px;
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
        text-align: center;
        animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        transition: transform 0.3s ease;
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .avatar-wrapper {
        margin-bottom: 24px;
        position: relative;
        display: inline-block;
    }

    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        border: 3px solid #d4af37;
        transition: all 0.3s ease;
    }

    .avatar:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
    }

    .avatar-glow {
        position: absolute;
        inset: -5px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.3), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .avatar-wrapper:hover .avatar-glow {
        opacity: 1;
    }

    h1 {
        font-size: 2.2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #0a2a66, #1a4fb3);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }

    .subtitle {
        color: #64748b;
        font-size: 0.85rem;
        margin-bottom: 32px;
        font-weight: 400;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: #0a2a66;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon span {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.1rem;
    }

    input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        border: 2px solid #e2e8f0;
        border-radius: 60px;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: #f8fafc;
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        background: white;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        border-radius: 60px;
        color: #0a2a66;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        background: linear-gradient(135deg, #e5c245, #c9a52e);
    }

    .error {
        background: #fef2f2;
        color: #dc2626;
        padding: 12px 16px;
        border-radius: 60px;
        font-size: 0.8rem;
        margin-top: 16px;
        border-left: 3px solid #dc2626;
    }

    .footer-text {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
        font-size: 0.7rem;
        color: #94a3b8;
    }

    @media (max-width: 480px) {
        .login-card {
            padding: 32px 24px;
        }
        h1 { font-size: 1.8rem; }
        .avatar { width: 80px; height: 80px; }
    }
</style>
</head>
<body>
<div class="bg-circle circle-1"></div>
<div class="bg-circle circle-2"></div>

<div class="login-card">
    <div class="avatar-wrapper">
        <img src="/static/avatar.png" class="avatar" alt="CREDU">
        <div class="avatar-glow"></div>
    </div>
    <h1>CREDU</h1>
    <p class="subtitle">Sistema de Credenciales Institucionales</p>

    <form action="/login" method="POST">
        <div class="input-group">
            <label>📧 CORREO INSTITUCIONAL</label>
            <div class="input-icon">
                <span>📧</span>
                <input type="email" name="correo" placeholder="correo@uniagustiniana.edu.co" required autocomplete="off">
            </div>
        </div>
        <button type="submit">
            <span>🔐</span> Ingresar
        </button>
    </form>

    <div class="error">{{ error }}</div>

    <div class="footer-text">
        🌟 Solo docentes con correo institucional 🌟<br>
        Uniagustiniana es creer en ti
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0a1f3e">
<title>CREDU · Acceso Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle at 10% 20%, #0a2a66, #020c1a, #010408);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        position: relative;
        overflow-x: hidden;
    }

    /* Mascota de fondo */
    body::before {
        content: "";
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 130px;
        height: 130px;
        background-image: url('/static/mascota.png');
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.2;
        pointer-events: none;
        z-index: 0;
    }

    /* Segunda mascota más pequeña en otra esquina */
    body::after {
        content: "";
        position: fixed;
        top: 20px;
        left: 20px;
        width: 80px;
        height: 80px;
        background-image: url('/static/mascota.png');
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.1;
        pointer-events: none;
        z-index: 0;
    }

    /* Birretes flotantes */
    .floating-mortar {
        position: absolute;
        font-size: 80px;
        opacity: 0.05;
        pointer-events: none;
        animation: floatMortar 12s infinite ease-in-out;
        color: #d4af37;
        z-index: 0;
    }

    @keyframes floatMortar {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(3deg); }
    }

    .mortar-1 { top: 5%; right: 5%; font-size: 100px; animation-delay: 0s; }
    .mortar-2 { bottom: 10%; left: 3%; font-size: 80px; animation-delay: 2s; }
    .mortar-3 { top: 20%; right: 10%; font-size: 60px; animation-delay: 5s; }
    .mortar-4 { bottom: 25%; right: 15%; font-size: 70px; animation-delay: 8s; }

    .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 400px;
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 36px;
        padding: 36px 28px;
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.35), 0 25px 40px rgba(0, 0, 0, 0.4);
        text-align: center;
        animation: fadeInScale 0.5s ease;
        transition: transform 0.3s ease;
        border: 1px solid rgba(212, 175, 55, 0.4);
    }

    @keyframes fadeInScale {
        from {
            opacity: 0;
            transform: scale(0.96) translateY(20px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.4), 0 10px 25px rgba(0, 0, 0, 0.3);
        margin-bottom: 16px;
        transition: all 0.3s ease;
    }

    h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #d4af37, #e8c84a);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 6px;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.7rem;
        margin-bottom: 28px;
        font-weight: 400;
        letter-spacing: 0.5px;
    }

    .input-group {
        margin-bottom: 16px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.65rem;
        font-weight: 700;
        color: #d4af37;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon span {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
        opacity: 0.7;
    }

    input {
        width: 100%;
        padding: 12px 14px 12px 40px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 50px;
        font-size: 0.85rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        -webkit-appearance: none;
        appearance: none;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.7rem;
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        background: rgba(255, 255, 255, 0.1);
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        border-radius: 50px;
        color: #0a1f3e;
        font-weight: 800;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    button:active {
        transform: scale(0.97);
    }

    .error {
        background: rgba(220, 38, 38, 0.15);
        color: #f87171;
        padding: 10px 14px;
        border-radius: 50px;
        font-size: 0.7rem;
        margin-top: 14px;
        border-left: 2px solid #f87171;
        backdrop-filter: blur(4px);
    }

    .footer-text {
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        font-size: 0.75rem;
        font-weight: 700;
        color: #d4af37;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
    }

    @media (max-width: 480px) {
        body {
            padding: 12px;
        }
        .login-card {
            padding: 28px 20px;
            border-radius: 32px;
        }
        .avatar {
            width: 65px;
            height: 65px;
        }
        h1 {
            font-size: 1.7rem;
        }
        .subtitle {
            font-size: 0.65rem;
            margin-bottom: 20px;
        }
        input {
            padding: 10px 12px 10px 36px;
            font-size: 0.8rem;
        }
        button {
            padding: 10px;
            font-size: 0.85rem;
        }
        .footer-text {
            font-size: 0.6rem;
            margin-top: 20px;
            padding-top: 12px;
        }
        body::before {
            width: 80px;
            height: 80px;
            bottom: 10px;
            right: 10px;
        }
        body::after {
            width: 50px;
            height: 50px;
            top: 10px;
            left: 10px;
        }
    }
</style>
</head>
<body>

<div class="floating-mortar mortar-1">🎓</div>
<div class="floating-mortar mortar-2">🎓</div>
<div class="floating-mortar mortar-3">🎓</div>
<div class="floating-mortar mortar-4">🎓</div>

<div class="login-card">
    <img src="/static/avatar.png" class="avatar" alt="CREDU">
    <h1>🎓 CREDU</h1>
    <p class="subtitle">Sistema de Credenciales Institucionales</p>

    <form action="/login" method="POST">
        <div class="input-group">
            <label>📧 CORREO INSTITUCIONAL</label>
            <div class="input-icon">
                <span>📧</span>
                <input type="email" name="correo" placeholder="correo@uniagustiniana.edu.co" required autocomplete="off">
            </div>
        </div>
        <button type="submit">
            <span>🔐</span> Ingresar
        </button>
    </form>

    <div class="error">{{ error }}</div>

    <div class="footer-text">
        ⭐ Uniagustiniana es creer en ti ⭐
    </div>
</div>

</body>
</html>

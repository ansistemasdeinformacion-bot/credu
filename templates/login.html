<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0a1f3e">
<title>CREDU · Acceso Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 30%, #0a1f3e, #020c1a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
    }

    /* Birretes decorativos */
    body::before {
        content: "🎓";
        font-size: 350px;
        position: absolute;
        bottom: -100px;
        left: -80px;
        opacity: 0.03;
        pointer-events: none;
        filter: blur(3px);
        transform: rotate(-10deg);
    }

    body::after {
        content: "🎓";
        font-size: 220px;
        position: absolute;
        top: -40px;
        right: -60px;
        opacity: 0.03;
        pointer-events: none;
        filter: blur(3px);
        transform: rotate(15deg);
    }

    .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 450px;
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(12px);
        border-radius: 48px;
        padding: 45px 35px;
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.25), 0 30px 50px rgba(0, 0, 0, 0.4);
        text-align: center;
        animation: fadeInScale 0.7s ease;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.4), 0 35px 55px rgba(0, 0, 0, 0.45);
    }

    @keyframes fadeInScale {
        from {
            opacity: 0;
            transform: scale(0.95) translateY(30px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.4), 0 15px 35px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
        transition: all 0.3s ease;
    }

    .avatar:hover {
        transform: scale(1.03);
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.6), 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #d4af37, #b8962e);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.85rem;
        margin-bottom: 32px;
        font-weight: 400;
        letter-spacing: 0.5px;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        color: #d4af37;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon span {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.1rem;
        opacity: 0.7;
    }

    input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 60px;
        font-size: 0.9rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.06);
        color: white;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        background: rgba(255, 255, 255, 0.1);
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        border-radius: 60px;
        color: #0a1f3e;
        font-weight: 800;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }

    button:active {
        transform: translateY(0px);
    }

    .error {
        background: rgba(220, 38, 38, 0.15);
        color: #f87171;
        padding: 12px 16px;
        border-radius: 60px;
        font-size: 0.75rem;
        margin-top: 16px;
        border-left: 2px solid #f87171;
        backdrop-filter: blur(4px);
    }

    .footer-text {
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        font-size: 0.8rem;
        font-weight: 600;
        color: #d4af37;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    /* ===== RESPONSIVE CELULAR ===== */
    @media (max-width: 550px) {
        body {
            padding: 16px;
        }
        .login-card {
            padding: 32px 24px;
            border-radius: 36px;
        }
        .avatar {
            width: 80px;
            height: 80px;
        }
        h1 {
            font-size: 2rem;
        }
        .subtitle {
            font-size: 0.7rem;
            margin-bottom: 24px;
        }
        .input-group label {
            font-size: 0.65rem;
        }
        input {
            padding: 12px 14px 12px 44px;
            font-size: 0.85rem;
        }
        button {
            padding: 12px;
            font-size: 0.9rem;
        }
        .footer-text {
            font-size: 0.65rem;
            margin-top: 24px;
            padding-top: 16px;
        }
        .error {
            font-size: 0.7rem;
            padding: 10px 14px;
        }
    }

    @media (max-width: 400px) {
        .login-card {
            padding: 28px 20px;
            border-radius: 32px;
        }
        h1 {
            font-size: 1.8rem;
        }
        .avatar {
            width: 70px;
            height: 70px;
        }
    }
</style>
</head>
<body>

<div class="login-card">
    <img src="/static/avatar.png" class="avatar" alt="CREDU">
    <h1>🎓 CREDU</h1>
    <p class="subtitle">Sistema de Credenciales Institucionales</p>

    <form action="/login" method="POST">
        <div class="input-group">
            <label>📧 CORREO INSTITUCIONAL</label>
            <div class="input-icon">
                <span>📧</span>
                <input type="email" name="correo" placeholder="correo@uniagustiniana.edu.co" required autocomplete="off">
            </div>
        </div>
        <button type="submit">
            <span>🔐</span> Ingresar
        </button>
    </form>

    <div class="error">{{ error }}</div>

    <div class="footer-text">
        ⚡ Uniagustiniana es creer en ti ⚡
    </div>
</div>
</body>
</html>

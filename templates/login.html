<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CREDU - Acceso</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b3c6f, #1e5fa3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.login-container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 350px;
}
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 25px;
    border: 1px solid #ccc;
}
button {
    background: #d4af37;
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    color: #0b3c6f;
}
.error {
    color: red;
    margin-top: 10px;
}
</style>
</head>
<body>
<div class="login-container">
    <h1>🎓 CREDU</h1>
    <p>Sistema de Credenciales Uniagustiniana</p>
    <form action="/login" method="POST">
        <input type="email" name="correo" placeholder="correo@uniagustiniana.edu.co" required>
        <button type="submit">Ingresar</button>
    </form>
    <div class="error">{{ error }}</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREDU · Acceso Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 30%, #0a1f3e, #020c1a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    /* Partículas animadas futuristas */
    .particle {
        position: absolute;
        background: rgba(212, 175, 55, 0.4);
        border-radius: 50%;
        pointer-events: none;
        filter: blur(2px);
        animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
        50% { transform: translateY(-30px) translateX(20px); opacity: 0.8; }
    }

    /* Fondo con birretes futuristas */
    body::before {
        content: "🎓";
        font-size: 400px;
        position: absolute;
        bottom: -120px;
        left: -100px;
        opacity: 0.03;
        pointer-events: none;
        filter: blur(3px);
        transform: rotate(-10deg);
    }

    body::after {
        content: "🎓";
        font-size: 250px;
        position: absolute;
        top: -50px;
        right: -80px;
        opacity: 0.03;
        pointer-events: none;
        filter: blur(3px);
        transform: rotate(20deg);
    }

    .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 480px;
        background: rgba(10, 31, 62, 0.45);
        backdrop-filter: blur(12px);
        border-radius: 48px;
        padding: 48px 40px;
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.2), 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 30px rgba(212, 175, 55, 0.1);
        text-align: center;
        animation: fadeInScale 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        transition: all 0.4s ease;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .login-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.5), 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(212, 175, 55, 0.2);
    }

    @keyframes fadeInScale {
        from {
            opacity: 0;
            transform: scale(0.95) translateY(30px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .avatar-wrapper {
        margin-bottom: 24px;
        position: relative;
        display: inline-block;
    }

    .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3), 0 15px 35px rgba(0, 0, 0, 0.3);
        transition: all 0.4s ease;
        filter: brightness(1.05);
    }

    .avatar:hover {
        transform: scale(1.05) rotate(3deg);
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.5), 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
        font-size: 2.6rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #d4af37, #b8962e);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
        letter-spacing: -1px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.85rem;
        margin-bottom: 32px;
        font-weight: 400;
        letter-spacing: 0.5px;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        color: #d4af37;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon span {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.1rem;
        opacity: 0.7;
    }

    input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 60px;
        font-size: 0.9rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.08);
        color: white;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        background: rgba(255, 255, 255, 0.12);
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.9), rgba(184, 150, 46, 0.9));
        border: none;
        border-radius: 60px;
        color: #0a1f3e;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        backdrop-filter: blur(4px);
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
        background: linear-gradient(135deg, #d4af37, #c9a52e);
    }

    .error {
        background: rgba(220, 38, 38, 0.15);
        color: #f87171;
        padding: 12px 16px;
        border-radius: 60px;
        font-size: 0.75rem;
        margin-top: 16px;
        border-left: 2px solid #f87171;
        backdrop-filter: blur(4px);
    }

    .footer-text {
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        font-size: 0.85rem;
        font-weight: 600;
        color: #d4af37;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    @media (max-width: 480px) {
        .login-card { padding: 32px 24px; }
        h1 { font-size: 2.2rem; }
        .avatar { width: 85px; height: 85px; }
        .footer-text { font-size: 0.7rem; }
    }
</style>
</head>
<body>

<div class="login-card">
    <div class="avatar-wrapper">
        <img src="/static/avatar.png" class="avatar" alt="CREDU">
    </div>
    <h1>🎓 CREDU</h1>
    <p class="subtitle">Sistema de Credenciales Institucionales</p>

    <form action="/login" method="POST">
        <div class="input-group">
            <label>📧 CORREO INSTITUCIONAL</label>
            <div class="input-icon">
                <span>📧</span>
                <input type="email" name="correo" placeholder="correo@uniagustiniana.edu.co" required autocomplete="off">
            </div>
        </div>
        <button type="submit">
            <span>🔐</span> Ingresar
        </button>
    </form>

    <div class="error">{{ error }}</div>

    <div class="footer-text">
        ⚡ Uniagustiniana es creer en ti ⚡
    </div>
</div>

<script>
    // Crear partículas animadas
    for (let i = 0; i < 30; i++) {
        let particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.width = Math.random() * 4 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = 6 + Math.random() * 6 + 's';
        document.body.appendChild(particle);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREDU · Inicio de Sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1f, #0a1428);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: rgba(10, 18, 34, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .login-card p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .login-input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 60px;
            color: #e8e8f0;
            outline: none;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00e5ff, #7c3aed);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            color: #0a0f1f;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3);
        }
        .error {
            color: #e05a5a;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🎓 CREDU</h2>
        <p>Sistema de Credenciales Institucionales</p>
        <form method="POST">
            <input type="text" name="cedula" class="login-input" placeholder="Cédula" autocomplete="off">
            <input type="password" name="contrasena" class="login-input" placeholder="Contraseña">
            <button type="submit" class="login-btn">Ingresar</button>
            {% if error %}
                <div class="error">Cédula o contraseña incorrectos</div>
            {% endif %}
        </form>
    </div>
</body>
</html>

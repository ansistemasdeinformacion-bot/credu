<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREDU · Acceso Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a1f3e 0%, #0e2d5a 40%, #0a1f3e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    /* Fondo con birretes flotantes */
    body::before {
        content: "🎓";
        font-size: 350px;
        position: absolute;
        bottom: -100px;
        left: -80px;
        opacity: 0.04;
        pointer-events: none;
        transform: rotate(-15deg);
    }

    body::after {
        content: "🎓";
        font-size: 200px;
        position: absolute;
        top: 20px;
        right: -60px;
        opacity: 0.04;
        pointer-events: none;
        transform: rotate(25deg);
    }

    /* Birretes decorativos adicionales */
    .mortar-1, .mortar-2, .mortar-3 {
        position: absolute;
        font-size: 60px;
        opacity: 0.05;
        pointer-events: none;
    }
    .mortar-1 { top: 15%; left: 5%; transform: rotate(-10deg); }
    .mortar-2 { bottom: 20%; right: 8%; transform: rotate(15deg); }
    .mortar-3 { top: 40%; right: 15%; transform: rotate(5deg); }

    /* Animación de gradiente */
    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .login-card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 460px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        border-radius: 48px;
        padding: 48px 40px;
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(212, 175, 55, 0.2);
        text-align: center;
        animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        transition: transform 0.3s ease;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .login-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 35px 55px rgba(0, 0, 0, 0.35);
        border-color: rgba(212, 175, 55, 0.5);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .avatar-wrapper {
        margin-bottom: 24px;
        position: relative;
        display: inline-block;
    }

    .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        border: 3px solid #d4af37;
        transition: all 0.4s ease;
    }

    .avatar:hover {
        transform: scale(1.05) rotate(3deg);
        box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
    }

    h1 {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #0a2a66, #1a4fb3);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
        letter-spacing: -1px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .subtitle {
        color: #64748b;
        font-size: 0.85rem;
        margin-bottom: 32px;
        font-weight: 400;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        color: #0a2a66;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon span {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.1rem;
    }

    input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        border: 2px solid #e2e8f0;
        border-radius: 60px;
        font-size: 0.9rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: #f8fafc;
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        background: white;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        border-radius: 60px;
        color: #0a2a66;
        font-weight: 800;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
        background: linear-gradient(135deg, #e5c245, #c9a52e);
    }

    .error {
        background: #fef2f2;
        color: #dc2626;
        padding: 12px 16px;
        border-radius: 60px;
        font-size: 0.75rem;
        margin-top: 16px;
        border-left: 3px solid #dc2626;
    }

    .footer-text {
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
        font-size: 0.85rem;
        font-weight: 600;
        color: #d4af37;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
        .login-card {
            padding: 32px 24px;
        }
        h1 { font-size: 2rem; }
        .avatar { width: 85px; height: 85px; }
        .footer-text { font-size: 0.75rem; }
    }
</style>
</head>
<body>
<div class="mortar-1">🎓</div>
<div class="mortar-2">🎓</div>
<div class="mortar-3">🎓</div>

<div class="login-card">
    <div class="avatar-wrapper">
        <img src="/static/avatar.png" class="avatar" alt="CREDU">
    </div>
    <h1>🎓 CREDU</h1>
    <p class="subtitle">Sistema de Credenciales Institucionales</p>

    <form action="/login" method="POST">
        <div class="input-group">
            <label>📧 CORREO INSTITUCIONAL</label>
            <div class="input-icon">
                <span>📧</span>
                <input type="email" name="correo" placeholder="correo@uniagustiniana.edu.co" required autocomplete="off">
            </div>
        </div>
        <button type="submit">
            <span>🔐</span> Ingresar
        </button>
    </form>

    <div class="error">{{ error }}</div>

    <div class="footer-text">
        🌟 Uniagustiniana es creer en ti 🌟
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin CREDU · Docentes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at 10% 20%, #0a2a66, #020c1a, #010408);
        min-height: 100vh;
        padding: 20px;
        position: relative;
    }
    body::before {
        content: "";
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 120px;
        height: 120px;
        background-image: url('/static/mascota.png');
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
    }
    .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 40px;
        margin-bottom: 25px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        flex-wrap: wrap;
        gap: 15px;
    }
    .header h1 { color: white; font-size: 1.5rem; display: flex; align-items: center; gap: 8px; }
    .logo-mascota { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #d4af37; }
    .nav-links { display: flex; gap: 15px; }
    .nav-link {
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }
    .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #d4af37, #b8962e); color: #0a1f3e; }
    .logout-btn {
        background: rgba(220, 38, 38, 0.2);
        color: #f87171;
        padding: 10px 20px;
        border-radius: 40px;
        text-decoration: none;
        border: 1px solid rgba(220, 38, 38, 0.3);
        transition: all 0.3s ease;
    }
    .btn-primary {
        background: linear-gradient(135deg, #d4af37, #b8962e);
        color: #0a1f3e;
        font-weight: 700;
        border: none;
        padding: 8px 16px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 0.8rem;
    }
    .btn-danger {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 0.8rem;
    }
    .btn-small { padding: 5px 12px; font-size: 0.7rem; margin: 0 2px; }
    .search-box {
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 15px 20px;
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }
    .search-box input {
        flex: 1;
        padding: 10px 16px;
        border-radius: 40px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 0.8rem;
    }
    .search-box input::placeholder { color: rgba(255, 255, 255, 0.5); }
    .tabla-container {
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 20px;
        margin-bottom: 25px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
    }
    th { color: #d4af37; font-weight: 600; }
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal-content {
        background: #0a1f3e;
        padding: 30px;
        border-radius: 30px;
        width: 90%;
        max-width: 500px;
    }
    .modal-content h3 { color: white; margin-bottom: 20px; }
    .modal-content input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 40px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }
    @media (max-width: 768px) {
        .nav-links { width: 100%; justify-content: center; }
        th, td { font-size: 0.7rem; padding: 8px; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><img src="/static/mascota.png" class="logo-mascota" alt="CREDU"> 📊 CREDU · Panel de Administración</h1>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link">📅 Calendario</a>
            <a href="/admin/docentes" class="nav-link active">📋 Docentes</a>
            <a href="/admin/graficas" class="nav-link">📈 Gráficas</a>
        </div>
        <a href="/admin/logout" class="logout-btn">🚪 Cerrar sesión</a>
    </div>

    <div class="search-box">
        <input type="text" id="filtro" placeholder="🔍 Buscar por cédula, nombre o correo..." onkeyup="filtrarDocentes()">
        <button class="btn-primary" onclick="cargarDocentes()">🔄 Actualizar</button>
        <button class="btn-primary" onclick="migrarExcel()">📎 Migrar Excel a BD</button>
        <button class="btn-primary" onclick="mostrarModalAgregar()">➕ Agregar Docente</button>
    </div>

    <div class="tabla-container">
        <h2>📋 Lista de Docentes</h2>
        <div id="tabla_docentes">
            <table id="tabla">
                <thead>
                    <tr><th>Cédula</th><th>Nombre</th><th>Correo</th><th>Contraseña</th><th>Personalizada</th><th>Acciones</th></tr>
                </thead>
                <tbody id="docentes_tbody">
                    <tr><td colspan="6" style="text-align:center">Cargando docentes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para agregar/editar docente -->
<div id="modalDocente" class="modal">
    <div class="modal-content">
        <h3 id="modalTitulo">Agregar Docente</h3>
        <input type="hidden" id="edit_cedula">
        <input type="text" id="docente_cedula" placeholder="Cédula">
        <input type="text" id="docente_nombre" placeholder="Nombre Completo">
        <input type="email" id="docente_correo" placeholder="Correo Institucional">
        <input type="text" id="docente_contraseña" placeholder="Contraseña">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-primary" onclick="guardarDocente()">💾 Guardar</button>
            <button class="btn-primary" onclick="cerrarModal()">❌ Cancelar</button>
        </div>
    </div>
</div>

<script>
let docentesData = [];

function cargarDocentes() {
    const tbody = document.getElementById('docentes_tbody');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Cargando...</td></tr>';
    
    fetch('/admin/api/docentes')
        .then(res => res.json())
        .then(data => {
            if (data.success && data.docentes.length > 0) {
                docentesData = data.docentes;
                mostrarDocentes(docentesData);
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No hay docentes registrados</td></tr>';
            }
        })
        .catch(error => {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Error al cargar docentes</td></tr>';
        });
}

function mostrarDocentes(docentes) {
    const tbody = document.getElementById('docentes_tbody');
    tbody.innerHTML = '';
    docentes.forEach(d => {
        tbody.innerHTML += `
            <tr>
                <td>${d.cedula}</td>
                <td>${d.nombre}</td>
                <td>${d.correo}</td>
                <td>${d.contraseña.length > 20 ? d.contraseña.substring(0, 20) + '...' : d.contraseña}</td>
                <td>${d.personalizada ? '✅ Sí' : '❌ No'}</td>
                <td>
                    <button class="btn-primary btn-small" onclick="editarDocente('${d.cedula}','${d.nombre}','${d.correo}','${d.contraseña}')">✏️ Editar</button>
                    <button class="btn-danger btn-small" onclick="eliminarDocente('${d.cedula}')">🗑️ Eliminar</button>
                </td>
            </tr>
        `;
    });
}

function filtrarDocentes() {
    const filtro = document.getElementById('filtro').value.toLowerCase();
    const filtrados = docentesData.filter(d => 
        d.cedula.toLowerCase().includes(filtro) ||
        d.nombre.toLowerCase().includes(filtro) ||
        d.correo.toLowerCase().includes(filtro)
    );
    mostrarDocentes(filtrados);
}

function migrarExcel() {
    if (confirm('¿Migrar todos los docentes del Excel a la base de datos? Los duplicados se actualizarán.')) {
        fetch('/admin/migrar_excel', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(`✅ Migración exitosa: ${data.migrados} docentes migrados, ${data.errores} errores`);
                    cargarDocentes();
                } else {
                    alert('❌ Error en migración: ' + data.error);
                }
            });
    }
}

function mostrarModalAgregar() {
    document.getElementById('modalTitulo').innerText = 'Agregar Docente';
    document.getElementById('edit_cedula').value = '';
    document.getElementById('docente_cedula').value = '';
    document.getElementById('docente_nombre').value = '';
    document.getElementById('docente_correo').value = '';
    document.getElementById('docente_contraseña').value = '';
    document.getElementById('modalDocente').style.display = 'flex';
}

function editarDocente(cedula, nombre, correo, contraseña) {
    document.getElementById('modalTitulo').innerText = 'Editar Docente';
    document.getElementById('edit_cedula').value = cedula;
    document.getElementById('docente_cedula').value = cedula;
    document.getElementById('docente_nombre').value = nombre;
    document.getElementById('docente_correo').value = correo;
    document.getElementById('docente_contraseña').value = contraseña;
    document.getElementById('modalDocente').style.display = 'flex';
}

function cerrarModal() {
    document.getElementById('modalDocente').style.display = 'none';
}

function guardarDocente() {
    const edit_cedula = document.getElementById('edit_cedula').value;
    const cedula = document.getElementById('docente_cedula').value;
    const nombre = document.getElementById('docente_nombre').value;
    const correo = document.getElementById('docente_correo').value;
    const contraseña = document.getElementById('docente_contraseña').value;
    
    if (!cedula || !nombre || !correo || !contraseña) {
        alert('Por favor complete todos los campos');
        return;
    }
    
    const url = edit_cedula ? '/admin/actualizar_docente' : '/admin/agregar_docente';
    
    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cedula, nombre, correo, contraseña })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert(edit_cedula ? '✅ Docente actualizado' : '✅ Docente agregado');
            cerrarModal();
            cargarDocentes();
        } else {
            alert('❌ Error: ' + (data.error || 'desconocido'));
        }
    });
}

function eliminarDocente(cedula) {
    if (confirm('¿Eliminar al docente con cédula ' + cedula + '? Esta acción no se puede deshacer.')) {
        fetch('/admin/eliminar_docente', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cedula: cedula })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert('✅ Docente eliminado');
                cargarDocentes();
            } else {
                alert('❌ Error al eliminar');
            }
        });
    }
}

cargarDocentes();
</script>
</body>
</html>

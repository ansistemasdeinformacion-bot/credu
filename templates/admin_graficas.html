<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin CREDU · Gráficas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at 10% 20%, #0a2a66, #020c1a, #010408);
        min-height: 100vh;
        padding: 20px;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 120px;
        height: 120px;
        background-image: url('/static/mascota.png');
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 40px;
        margin-bottom: 25px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        flex-wrap: wrap;
        gap: 15px;
    }

    .header h1 {
        color: white;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logo-mascota {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #d4af37;
    }

    .nav-links {
        display: flex;
        gap: 15px;
    }

    .nav-link {
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }

    .nav-link:hover, .nav-link.active {
        background: linear-gradient(135deg, #d4af37, #b8962e);
        color: #0a1f3e;
    }

    .logout-btn {
        background: rgba(220, 38, 38, 0.2);
        color: #f87171;
        padding: 10px 20px;
        border-radius: 40px;
        text-decoration: none;
        border: 1px solid rgba(220, 38, 38, 0.3);
        transition: all 0.3s ease;
    }

    .logout-btn:hover {
        background: rgba(220, 38, 38, 0.4);
    }

    .card {
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 25px;
        margin-bottom: 25px;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .card h2 {
        color: white;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .selector-año {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .selector-año label {
        color: #d4af37;
        font-weight: 600;
    }

    select, button {
        padding: 10px 20px;
        border-radius: 40px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
    }

    .btn-primary {
        background: linear-gradient(135deg, #d4af37, #b8962e);
        color: #0a1f3e;
        font-weight: 700;
        border: none;
    }

    .chart-container {
        position: relative;
        height: 400px;
        margin-top: 20px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 25px;
    }

    .stat-card {
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 20px;
        text-align: center;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .stat-number {
        font-size: 2rem;
        font-weight: 800;
        color: #d4af37;
    }

    .stat-label {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.8rem;
        margin-top: 5px;
    }

    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            text-align: center;
        }
        .chart-container {
            height: 300px;
        }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <img src="/static/mascota.png" class="logo-mascota" alt="CREDU">
            📊 CREDU · Panel de Administración
        </h1>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link">📅 Calendario</a>
            <a href="/admin/graficas" class="nav-link active">📈 Gráficas</a>
        </div>
        <a href="/admin/logout" class="logout-btn">🚪 Cerrar sesión</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="totalConsultas">0</div>
            <div class="stat-label">📋 Total consultas</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="promedioMensual">0</div>
            <div class="stat-label">📊 Promedio mensual</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="mejorMes">-</div>
            <div class="stat-label">🏆 Mejor mes</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="peorMes">-</div>
            <div class="stat-label">📉 Mes con menos</div>
        </div>
    </div>

    <div class="card" id="grafica-card">
        <h2>📈 Consultas por mes</h2>
        <div class="selector-año">
            <label>Seleccionar año:</label>
            <select id="añoSelector">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>
            <button class="btn-primary" onclick="cargarGrafica()">Actualizar gráfica</button>
            <button class="btn-primary" onclick="descargarImagen()">📸 Descargar como imagen</button>
        </div>
        <div class="chart-container">
            <canvas id="graficaMensual"></canvas>
        </div>
    </div>
</div>

<script>
let chart;

async function cargarGrafica() {
    const año = document.getElementById('añoSelector').value;
    
    try {
        const response = await fetch(`/admin/datos_grafica?año=${año}`);
        const data = await response.json();
        
        if (data.success) {
            document.getElementById('totalConsultas').innerText = data.total_consultas;
            document.getElementById('promedioMensual').innerText = data.promedio_mensual;
            
            if (data.mejor_mes) {
                document.getElementById('mejorMes').innerHTML = `${data.mejor_mes} 📈`;
            }
            if (data.peor_mes) {
                document.getElementById('peorMes').innerHTML = `${data.peor_mes} 📉`;
            }
            
            if (chart) {
                chart.destroy();
            }
            
            const ctx = document.getElementById('graficaMensual').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.meses,
                    datasets: [{
                        label: 'Número de consultas',
                        data: data.valores,
                        backgroundColor: 'rgba(212, 175, 55, 0.7)',
                        borderColor: '#d4af37',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white',
                                font: { size: 12 }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 31, 62, 0.9)',
                            titleColor: '#d4af37',
                            bodyColor: 'white',
                            borderColor: '#d4af37',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return `Consultas: ${context.raw}`;
                                }
                            }
                        },
                        // ============================================
                        // DATALABELS: MUESTRA LOS NÚMEROS EN LAS BARRAS
                        // ============================================
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            offset: 4,
                            color: '#d4af37',
                            font: {
                                weight: 'bold',
                                size: 12
                            },
                            formatter: function(value) {
                                return value > 0 ? value : '';
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { 
                                color: 'white', 
                                stepSize: 1,
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: 'white', font: { size: 11 } }
                        }
                    }
                }
            });
        }
    } catch (error) {
        console.error('Error cargando gráfica:', error);
    }
}

function descargarImagen() {
    const elemento = document.getElementById('grafica-card');
    
    html2canvas(elemento, {
        scale: 2,
        backgroundColor: '#0a1f3e',
        logging: false
    }).then(canvas => {
        const enlace = document.createElement('a');
        const año = document.getElementById('añoSelector').value;
        enlace.download = `grafica_consultas_${año}.png`;
        enlace.href = canvas.toDataURL('image/png');
        enlace.click();
    }).catch(error => {
        console.error('Error al generar la imagen:', error);
        alert('Error al generar la imagen. Intente nuevamente.');
    });
}

cargarGrafica();
</script>
</body>
</html>

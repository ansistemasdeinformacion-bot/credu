<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREDU · Panel del Docente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1f, #0a1428);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dashboard-card {
            background: rgba(10, 18, 34, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            background: linear-gradient(135deg, #fff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        p { color: #94a3b8; margin-bottom: 30px; }
        .logout-btn {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(224, 90, 90, 0.2);
            border: 1px solid rgba(224, 90, 90, 0.3);
            border-radius: 40px;
            color: #e05a5a;
            text-decoration: none;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(224, 90, 90, 0.4); }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h2>🎓 Bienvenido, {{ nombre }}</h2>
        <p>Panel del Docente - CREDU</p>
        <p>Sistema de Credenciales Institucionales</p>
        <a href="/logout" class="logout-btn">Cerrar sesión</a>
    </div>
</body>
</html>

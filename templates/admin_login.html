<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin CREDU · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle at 10% 20%, #0a2a66, #020c1a, #010408);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
    }

    /* Mascota de fondo */
    body::before {
        content: "";
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 120px;
        height: 120px;
        background-image: url('/static/mascota.png');
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
    }

    /* Birretes flotantes */
    .floating-mortar {
        position: absolute;
        font-size: 80px;
        opacity: 0.05;
        pointer-events: none;
        animation: floatMortar 12s infinite ease-in-out;
        color: #d4af37;
        z-index: 0;
    }

    @keyframes floatMortar {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(3deg); }
    }

    .mortar-1 { top: 5%; right: 5%; font-size: 100px; animation-delay: 0s; }
    .mortar-2 { bottom: 10%; left: 3%; font-size: 80px; animation-delay: 2s; }
    .mortar-3 { top: 20%; right: 10%; font-size: 60px; animation-delay: 5s; }
    .mortar-4 { bottom: 25%; right: 15%; font-size: 70px; animation-delay: 8s; }

    .login-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 400px;
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 40px;
        padding: 40px 35px;
        text-align: center;
        border: 1px solid rgba(212, 175, 55, 0.4);
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.35), 0 30px 50px rgba(0, 0, 0, 0.5);
        animation: fadeInScale 0.5s ease;
    }

    @keyframes fadeInScale {
        from {
            opacity: 0;
            transform: scale(0.96) translateY(20px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #d4af37);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.8rem;
        margin-bottom: 30px;
    }

    input {
        width: 100%;
        padding: 14px 18px;
        margin: 10px 0;
        border-radius: 60px;
        border: 1px solid rgba(212, 175, 55, 0.35);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 0.9rem;
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        border-radius: 60px;
        color: #0a1f3e;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 15px;
        transition: all 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.35);
    }

    .error {
        background: rgba(220, 38, 38, 0.15);
        color: #f87171;
        padding: 12px;
        border-radius: 60px;
        font-size: 0.75rem;
        margin-top: 15px;
    }

    .footer-text {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        font-size: 0.75rem;
        font-weight: 700;
        color: #d4af37;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    @media (max-width: 480px) {
        .login-card {
            padding: 28px 20px;
            border-radius: 32px;
        }
        h1 {
            font-size: 1.7rem;
        }
        input {
            padding: 10px 14px;
            font-size: 0.8rem;
        }
        button {
            padding: 10px;
            font-size: 0.85rem;
        }
        .footer-text {
            font-size: 0.6rem;
        }
        body::before {
            width: 80px;
            height: 80px;
        }
    }
</style>
</head>
<body>

<div class="floating-mortar mortar-1">🎓</div>
<div class="floating-mortar mortar-2">🎓</div>
<div class="floating-mortar mortar-3">🎓</div>
<div class="floating-mortar mortar-4">🎓</div>

<div class="login-card">
    <h1>🔐 ADMIN CREDU</h1>
    <p class="subtitle">Panel de administración</p>

    <form action="/admin/login" method="POST">
        <input type="text" name="usuario" placeholder="👤 Usuario" required autocomplete="off">
        <input type="password" name="password" placeholder="🔒 Contraseña" required>
        <button type="submit">Ingresar al panel</button>
    </form>

    <div class="error">{{ error }}</div>

    <div class="footer-text">
        ⭐ Uniagustiniana es creer en ti ⭐
    </div>
</div>

</body>
</html>

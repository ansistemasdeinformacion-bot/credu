<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin CREDU · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at 10% 20%, #0a2a66, #020c1a, #010408);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .login-card {
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 40px;
        padding: 40px 35px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        border: 1px solid rgba(212, 175, 55, 0.4);
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.35), 0 30px 50px rgba(0, 0, 0, 0.5);
    }

    h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #d4af37);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.8rem;
        margin-bottom: 30px;
    }

    input {
        width: 100%;
        padding: 14px 18px;
        margin: 10px 0;
        border-radius: 60px;
        border: 1px solid rgba(212, 175, 55, 0.35);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 0.9rem;
    }

    input:focus {
        outline: none;
        border-color: #d4af37;
    }

    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        border-radius: 60px;
        color: #0a1f3e;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 15px;
        transition: all 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(212, 175, 55, 0.35);
    }

    .error {
        background: rgba(220, 38, 38, 0.15);
        color: #f87171;
        padding: 12px;
        border-radius: 60px;
        font-size: 0.75rem;
        margin-top: 15px;
    }

    .footer-text {
        margin-top: 25px;
        font-size: 0.7rem;
        color: #d4af37;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        padding-top: 20px;
    }
</style>
</head>
<body>
<div class="login-card">
    <h1>🔐 ADMIN CREDU</h1>
    <p class="subtitle">Panel de administración</p>

    <form action="/admin/login" method="POST">
        <input type="text" name="usuario" placeholder="👤 Usuario" required autocomplete="off">
        <input type="password" name="password" placeholder="🔒 Contraseña" required>
        <button type="submit">Ingresar al panel</button>
    </form>

    <div class="error">{{ error }}</div>
    <div class="footer-text">⚡ Solo personal autorizado</div>
</div>
</body>
</html>

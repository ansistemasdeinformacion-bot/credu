<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREDU · Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2a66, #0a1428);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            background: rgba(10, 31, 62, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 500px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #0a2a66, #0a1f3e);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .chat-header h1 { color: #d4af37; font-size: 24px; }
        .chat-header p { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 5px; }
        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .bot-message {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .bot-avatar {
            width: 40px;
            height: 40px;
            background: #d4af37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .message {
            background: rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            color: white;
            font-size: 14px;
            line-height: 1.4;
        }
        .user-message {
            text-align: right;
        }
        .user-bubble {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: #0a1f3e;
            padding: 10px 16px;
            border-radius: 18px;
            border-top-right-radius: 4px;
            display: inline-block;
            font-weight: 600;
        }
        .chat-footer {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            gap: 10px;
        }
        .chat-footer input {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }
        .chat-footer button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span { width: 6px; height: 6px; background: #d4af37; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-si, .btn-no { padding: 6px 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }
        .btn-si { background: #10b981; color: white; }
        .btn-no { background: #ef4444; color: white; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🎓 CREDU</h1>
        <p>Asistente Virtual · Credenciales Uniagustiniana</p>
    </div>
    <div class="chat-body" id="chat">
        <div class="bot-message">
            <div class="bot-avatar">🤖</div>
            <div class="message">
                <b>✨ ¡Hola {{ nombre }}!</b><br>
                Para obtener tus credenciales, ingresa tu número de cédula.
            </div>
        </div>
    </div>
    <div class="chat-footer">
        <input type="text" id="cedula" placeholder="🔢 Ingresa tu cédula" autocomplete="off">
        <button onclick="enviarCedula()">Enviar</button>
    </div>
</div>

<script>
    let nombreCompleto = "";
    let primerNombre = "";
    let genero = "masculino";

    function obtenerPrimerNombre(nombreCompleto) {
        return nombreCompleto.trim().split(" ")[0];
    }

    function detectarGenero(nombre) {
        let femeninos = ["maria", "ana", "luz", "andrea", "carolina", "laura", "diana", "patricia", "sandra", "lorena", "martha", "gloria", "liliana", "angela", "monica", "natalia", "viviana", "catalina", "daniela", "alejandra", "tatiana", "veronica", "beatriz", "eliana", "yuly", "leidy", "lizeth", "karen", "juliana", "estefania", "melissa", "valentina", "sofia", "camila", "valeria", "mariana", "fernanda"];
        if (femeninos.includes(nombre.toLowerCase())) return "femenino";
        if (nombre.endsWith("a") && !nombre.endsWith("o")) return "femenino";
        return "masculino";
    }

    function mostrarPreguntaFinal() {
        let chat = document.getElementById("chat");
        let tratamiento = genero === "femenino" ? "profesora" : "profesor";
        chat.innerHTML += `
        <div class="bot-message" id="pregunta-final">
            <div class="bot-avatar">🤖</div>
            <div class="message">
                🤝 <strong>¿Te puedo colaborar en algo más, ${tratamiento} ${primerNombre}?</strong>
                <div class="button-group">
                    <button class="btn-si" onclick="respuestaSi()">✅ Sí</button>
                    <button class="btn-no" onclick="respuestaNo()">❌ No</button>
                </div>
            </div>
        </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    }

    function respuestaSi() { window.location.href = "/"; }
    function respuestaNo() { window.location.href = "/logout"; }

    function enviarCedula() {
        let cedula = document.getElementById("cedula").value.trim();
        let chat = document.getElementById("chat");

        if (cedula === "") { alert("Ingresa tu cédula"); return; }

        chat.innerHTML += `<div class="user-message"><div class="user-bubble">🔢 ${cedula}</div></div>`;
        document.getElementById("cedula").value = "";

        chat.innerHTML += `<div class="bot-message" id="loading"><div class="bot-avatar">🤖</div><div class="message"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>`;
        chat.scrollTop = chat.scrollHeight;

        fetch("/consultar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cedula: cedula })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById("loading")?.remove();
            if (data.success) {
                nombreCompleto = data.nombre;
                primerNombre = obtenerPrimerNombre(nombreCompleto);
                genero = detectarGenero(primerNombre);
                let tratamiento = genero === "femenino" ? "profesora" : "profesor";

                chat.innerHTML += `
                <div class="bot-message">
                    <div class="bot-avatar">🤖</div>
                    <div class="message">
                        <b>✨ ¡Hola ${tratamiento} ${primerNombre}!</b><br><br>
                        📧 Se han enviado tus credenciales a tu correo:<br>
                        <strong>${data.correo}</strong><br><br>
                        📌 Revisa tu bandeja de <strong>recibidos</strong> o <strong>spam</strong>.
                    </div>
                </div>
                `;
                mostrarPreguntaFinal();
            } else {
                chat.innerHTML += `
                <div class="bot-message">
                    <div class="bot-avatar">🤖</div>
                    <div class="message">${data.mensaje || "❌ Error al verificar la cédula"}</div>
                </div>
                `;
            }
            chat.scrollTop = chat.scrollHeight;
        });
    }
</script>
</body>
</html>

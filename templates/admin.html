<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREDU · Administración de Docentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1f; color: #e8e8f0; padding: 40px 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: rgba(10,18,34,0.9); border-radius: 32px; padding: 30px; border: 1px solid rgba(0,229,255,0.3); }
        h1 { background: linear-gradient(135deg,#fff,#00e5ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 30px; }
        .toolbar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; background: #00e5ff; color: #0a0f1f; transition: 0.3s; }
        .btn-outline { background: transparent; border: 1px solid #00e5ff; color: #00e5ff; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,229,255,0.3); }
        .search-box input { width: 300px; padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.3); border-radius: 40px; color: #e8e8f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(0,229,255,0.1); }
        th { color: #00e5ff; }
        .edit-btn, .delete-btn { background: none; border: none; cursor: pointer; font-size: 18px; margin: 0 5px; }
        .edit-btn { color: #f5c542; }
        .delete-btn { color: #e05a5a; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0a1428; padding: 30px; border-radius: 24px; width: 400px; border: 1px solid rgba(0,229,255,0.3); }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.3); border-radius: 40px; color: #e8e8f0; }
        .file-input { display: none; }
        .logout-link { margin-left: auto; color: #e05a5a; text-decoration: none; padding: 10px 20px; border-radius: 40px; background: rgba(224,90,90,0.1); }
        .logout-link:hover { background: rgba(224,90,90,0.2); }
        @media (max-width: 768px) { .container { padding: 20px; } .toolbar { flex-direction: column; } .search-box input { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🎓 CREDU · Administración de Docentes</h1>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por cédula, nombre o correo...">
        </div>
        <button class="btn" id="migrarBtn">📂 Migrar Excel a BD</button>
        <button class="btn btn-outline" id="agregarBtn">➕ Agregar Docente</button>
        <a href="/admin/logout" class="logout-link">Cerrar sesión</a>
    </div>

    <div style="overflow-x: auto;">
        <table id="docentesTable">
            <thead><tr><th>Cédula</th><th>Nombre Completo</th><th>Correo</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="docentesBody"><tr><td colspan="5">Cargando docentes...</td></tr></tbody>
        </table>
    </div>
</div>

<input type="file" id="excelFile" class="file-input" accept=".xlsx,.xls">

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Agregar Docente</h3>
        <input type="text" id="modalCedula" placeholder="Cédula *" autocomplete="off">
        <input type="text" id="modalNombre" placeholder="Nombre Completo *">
        <input type="email" id="modalCorreo" placeholder="Correo *">
        <input type="text" id="modalContrasena" placeholder="Contraseña *">
        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
            <button class="btn-outline" id="modalCancelBtn">Cancelar</button>
            <button class="btn" id="modalSaveBtn">Guardar</button>
        </div>
    </div>
</div>

<script>
    let editingCedula = null;

    async function cargarDocentes() {
        const search = document.getElementById('searchInput').value;
        const res = await fetch(`/api/docentes?search=${encodeURIComponent(search)}`);
        if (!res.ok) { document.getElementById('docentesBody').innerHTML = '<tr><td colspan="5">Error al cargar</td></tr>'; return; }
        const docentes = await res.json();
        const tbody = document.getElementById('docentesBody');
        if (!docentes.length) { tbody.innerHTML = '<tr><td colspan="5">No hay docentes registrados</td></tr>'; return; }
        tbody.innerHTML = docentes.map(d => `
            <tr>
                <td>${escapeHtml(d.cedula)}</td>
                <td>${escapeHtml(d.nombre_completo)}</td>
                <td>${escapeHtml(d.correo)}</td>
                <td>✅ Activo</td>
                <td>
                    <button class="edit-btn" onclick='editarDocente(${JSON.stringify(d)})'>✏️</button>
                    <button class="delete-btn" onclick="eliminarDocente('${escapeHtml(d.cedula)}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});
    }

    window.editarDocente = (d) => {
        editingCedula = d.cedula;
        document.getElementById('modalTitle').innerText = 'Editar Docente';
        document.getElementById('modalCedula').value = d.cedula;
        document.getElementById('modalNombre').value = d.nombre_completo;
        document.getElementById('modalCorreo').value = d.correo;
        document.getElementById('modalContrasena').value = '';
        document.getElementById('modalCedula').disabled = true;
        document.getElementById('modal').style.display = 'flex';
    };

    window.eliminarDocente = async (cedula) => {
        if (!confirm('¿Eliminar este docente?')) return;
        await fetch(`/api/docentes/${cedula}`, { method: 'DELETE' });
        cargarDocentes();
    };

    document.getElementById('agregarBtn').onclick = () => {
        editingCedula = null;
        document.getElementById('modalTitle').innerText = 'Agregar Docente';
        document.getElementById('modalCedula').value = '';
        document.getElementById('modalNombre').value = '';
        document.getElementById('modalCorreo').value = '';
        document.getElementById('modalContrasena').value = '';
        document.getElementById('modalCedula').disabled = false;
        document.getElementById('modal').style.display = 'flex';
    };

    document.getElementById('modalSaveBtn').onclick = async () => {
        const data = {
            cedula: document.getElementById('modalCedula').value.trim(),
            nombre_completo: document.getElementById('modalNombre').value.trim(),
            correo: document.getElementById('modalCorreo').value.trim(),
            contrasena: document.getElementById('modalContrasena').value.trim()
        };
        if (!data.cedula || !data.nombre_completo || !data.correo || !data.contrasena) {
            alert('Todos los campos son obligatorios');
            return;
        }
        let url = '/api/docentes';
        let method = 'POST';
        if (editingCedula) { url = `/api/docentes/${editingCedula}`; method = 'PUT'; }
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (res.ok) {
            document.getElementById('modal').style.display = 'none';
            cargarDocentes();
        } else { const err = await res.json(); alert('Error: ' + (err.error || 'desconocido')); }
    };

    document.getElementById('modalCancelBtn').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
    document.getElementById('searchInput').addEventListener('input', cargarDocentes);

    document.getElementById('migrarBtn').onclick = () => document.getElementById('excelFile').click();
    document.getElementById('excelFile').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('excel', file);
        const btn = document.getElementById('migrarBtn');
        btn.textContent = '⏳ Subiendo...';
        btn.disabled = true;
        try {
            const res = await fetch('/api/migrar-excel', { method: 'POST', body: formData });
            const result = await res.json();
            alert(result.mensaje || `✅ ${result.migrados} docentes migrados, ${result.errores} errores`);
        } catch(err) { alert('Error al subir el archivo'); }
        btn.textContent = '📂 Migrar Excel a BD';
        btn.disabled = false;
        cargarDocentes();
        document.getElementById('excelFile').value = '';
    };

    cargarDocentes();
</script>
</body>
</html>

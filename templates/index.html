<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CREDU · Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a1f3e 0%, #0e2d5a 40%, #0a1f3e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    /* Fondo con birretes */
    body::before {
        content: "🎓";
        font-size: 350px;
        position: absolute;
        bottom: -100px;
        left: -80px;
        opacity: 0.04;
        pointer-events: none;
        transform: rotate(-15deg);
    }

    body::after {
        content: "🎓";
        font-size: 200px;
        position: absolute;
        top: 20px;
        right: -60px;
        opacity: 0.04;
        pointer-events: none;
        transform: rotate(25deg);
    }

    .mortar-1, .mortar-2 {
        position: absolute;
        font-size: 70px;
        opacity: 0.04;
        pointer-events: none;
    }
    .mortar-1 { bottom: 10%; right: 5%; transform: rotate(-5deg); }
    .mortar-2 { top: 15%; left: 8%; transform: rotate(10deg); }

    .chat-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 520px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(12px);
        border-radius: 40px;
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(212, 175, 55, 0.2);
        overflow: hidden;
        animation: slideUp 0.5s ease;
        transition: transform 0.3s ease;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .chat-container:hover {
        transform: translateY(-4px);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .chat-header {
        background: linear-gradient(135deg, #0a2a66, #0d3a8a);
        padding: 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .chat-header::before {
        content: "🎓";
        position: absolute;
        top: -10px;
        right: -10px;
        font-size: 80px;
        opacity: 0.06;
        pointer-events: none;
    }

    .chat-header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: white;
    }

    .chat-header p {
        font-size: 0.7rem;
        opacity: 0.8;
        margin-top: 6px;
    }

    .chat-body {
        padding: 24px;
        height: 480px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: #f7f9fc;
        scroll-behavior: smooth;
    }

    .chat-body::-webkit-scrollbar {
        width: 5px;
    }

    .chat-body::-webkit-scrollbar-track {
        background: #e2e8f0;
        border-radius: 10px;
    }

    .chat-body::-webkit-scrollbar-thumb {
        background: #d4af37;
        border-radius: 10px;
    }

    .bot-message {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        animation: fadeInLeft 0.4s ease;
    }

    @keyframes fadeInLeft {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .bot-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        border: 2px solid #d4af37;
        transition: all 0.3s ease;
    }

    .bot-avatar:hover {
        transform: scale(1.05) rotate(3deg);
        box-shadow: 0 6px 14px rgba(212, 175, 55, 0.3);
    }

    .message {
        background: white;
        padding: 14px 18px;
        border-radius: 20px;
        border-top-left-radius: 6px;
        max-width: 78%;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        font-size: 0.85rem;
        line-height: 1.5;
        color: #1e293b;
    }

    .user-message {
        text-align: right;
        animation: fadeInRight 0.4s ease;
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .user-bubble {
        display: inline-block;
        background: linear-gradient(135deg, #0a2a66, #0d3a8a);
        color: white;
        padding: 12px 20px;
        border-radius: 24px;
        border-top-right-radius: 6px;
        max-width: 78%;
        font-size: 0.85rem;
        font-weight: 500;
        box-shadow: 0 4px 12px rgba(10, 42, 102, 0.2);
    }

    .button-group {
        display: flex;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
    }

    .btn-si, .btn-no {
        padding: 10px 24px;
        border-radius: 40px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.8rem;
        transition: all 0.3s ease;
    }

    .btn-si {
        background: linear-gradient(135deg, #0a2a66, #0d3a8a);
        color: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .btn-si:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(10, 42, 102, 0.3);
    }

    .btn-no {
        background: #e2e8f0;
        color: #1e293b;
    }

    .btn-no:hover {
        transform: translateY(-2px);
        background: #cbd5e1;
    }

    .alerta-personalizada {
        background: linear-gradient(135deg, #fef3c7, #fde68a);
        border-left: 4px solid #f59e0b;
        padding: 12px;
        margin-top: 12px;
        border-radius: 14px;
        font-size: 0.75rem;
        color: #92400e;
    }

    .chat-footer {
        display: flex;
        padding: 20px 24px;
        background: white;
        border-top: 1px solid #eef2f6;
        gap: 12px;
    }

    .chat-footer input {
        flex: 1;
        padding: 14px 18px;
        border-radius: 60px;
        border: 2px solid #e2e8f0;
        font-size: 0.85rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: #f8fafc;
    }

    .chat-footer input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        background: white;
    }

    .send-btn {
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        padding: 12px 24px;
        border-radius: 60px;
        cursor: pointer;
        font-weight: 600;
        color: #0a2a66;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(212, 175, 55, 0.3);
    }

    .footer-text {
        text-align: center;
        padding: 16px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #d4af37;
        background: white;
        border-top: 1px solid #eef2f6;
        letter-spacing: 0.5px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .loading-dots {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .loading-dots span {
        width: 7px;
        height: 7px;
        background: #d4af37;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 480px) {
        .chat-container { border-radius: 28px; }
        .chat-header h1 { font-size: 1.3rem; }
        .message, .user-bubble { max-width: 88%; font-size: 0.8rem; }
        .bot-avatar { width: 38px; height: 38px; }
        .chat-footer { padding: 16px; }
        .send-btn { padding: 10px 18px; font-size: 0.8rem; }
        .footer-text { font-size: 0.7rem; }
    }
</style>
</head>
<body>
<div class="mortar-1">🎓</div>
<div class="mortar-2">🎓</div>

<div class="chat-container">

<div class="chat-header">
    <h1>🎓 CREDU</h1>
    <p>Asistente Virtual · Credenciales Uniagustiniana</p>
</div>

<div class="chat-body" id="chat">

<div class="bot-message">
    <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
    <div class="message">
        <b>✨ ¡Hola! Soy CREDU</b><br>
        Tu asistente para obtener tus credenciales institucionales.<br><br>
        📌 <strong>Ingresa tu número de cédula</strong>
    </div>
</div>

</div>

<div class="chat-footer">
    <input type="text" id="cedula" placeholder="🔢 Ej: 12345678" autocomplete="off">
    <button class="send-btn" onclick="enviarCedula()">📤 Enviar</button>
</div>

<div class="footer-text">
    🌟 Uniagustiniana es creer en ti 🌟
</div>

</div>

<script>
let nombreCompleto = "";
let primerNombre = "";
let genero = "docente";

function obtenerPrimerNombre(nombreCompleto) {
    let partes = nombreCompleto.trim().split(" ");
    return partes[0];
}

function detectarGenero(nombreCompleto) {
    let nombre = obtenerPrimerNombre(nombreCompleto).toLowerCase();
    let femeninos = [
        "maria", "ana", "luz", "kelly", "andrea", "carolina", "lina", "paula",
        "diana", "claudia", "sandra", "patricia", "lorena", "martha", "gloria",
        "yolanda", "liliana", "angela", "monica", "johanna", "natalia", "viviana",
        "laura", "catalina", "daniela", "alejandra", "tatiana", "veronica",
        "beatriz", "eliana", "yuly", "leidy", "lizeth", "karen", "juliana",
        "estefania", "yessica", "dayana", "melissa", "valentina", "sofia",
        "camila", "valeria", "mariana", "isabella", "luciana", "fernanda",
        "julieta", "ximena", "adriana", "amanda", "zulma", "leonor", "mirta",
        "enith", "gladys", "yuby", "yuli", "yohanna", "isabel", "briggitte",
        "maribel", "yolima", "barbara", "esperanza", "solangel", "sonia"
    ];
    return femeninos.includes(nombre) ? "estimada docente" : "estimado docente";
}

function mostrarPreguntaFinal() {
    let chat = document.getElementById("chat");
    let saludo = genero === "estimada docente" ? "profesora" : "profesor";
    
    chat.innerHTML += `
    <div class="bot-message" id="pregunta-final">
        <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
        <div class="message">
            🤝 <strong>¿Te puedo colaborar en algo más, ${saludo} ${primerNombre}?</strong>
            <div class="button-group">
                <button class="btn-si" onclick="respuestaSi()">✅ Sí</button>
                <button class="btn-no" onclick="respuestaNo()">❌ No</button>
            </div>
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;
}

function respuestaSi() {
    fetch("/logout", { method: "GET" })
    .then(() => {
        window.location.href = "/login";
    });
}

function respuestaNo() {
    let chat = document.getElementById("chat");
    document.getElementById("pregunta-final")?.remove();
    let despedida = genero === "estimada docente" ? "profesora" : "profesor";
    
    chat.innerHTML += `
    <div class="bot-message">
        <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
        <div class="message">
            👋 <strong>Fue un gusto ayudarte, ${despedida} ${primerNombre}.</strong><br><br>
            📌 Si necesitas algo más, puedes volver a ingresar cuando lo requieras.<br><br>
            🌟 <em>Uniagustiniana es creer en ti</em>
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;
    
    document.getElementById("cedula").disabled = true;
    document.querySelector(".send-btn").disabled = true;
}

function enviarCedula() {
    let cedula = document.getElementById("cedula").value.trim();
    let chat = document.getElementById("chat");

    if (cedula === "") {
        alert("📌 Por favor ingresa tu cédula");
        return;
    }

    chat.innerHTML += `
    <div class="user-message">
        <div class="user-bubble">
            🔢 ${cedula}
        </div>
    </div>
    `;

    document.getElementById("cedula").value = "";

    chat.innerHTML += `
    <div class="bot-message" id="loading">
        <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
        <div class="message">
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;

    fetch("/consultar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cedula: cedula })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("loading")?.remove();

        if (data.success) {
            nombreCompleto = data.nombre;
            primerNombre = obtenerPrimerNombre(nombreCompleto);
            genero = detectarGenero(nombreCompleto);
            
            let mensajeAdicional = "";
            let estadoEnvio = data.enviado ? "✅ Correo enviado correctamente" : "⚠️ No se pudo enviar el correo. Contacta a Tecnologías.";
            
            if (data.personalizada) {
                mensajeAdicional = `
                <div class="alerta-personalizada">
                    ⚠️ <strong>Tu contraseña fue personalizada por ti mismo</strong><br><br>
                    En caso de que no la recuerdes, debes acercarte a la oficina de Tecnologías<br>
                    o escribir al correo: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
                </div>
                `;
            }

            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
                <div class="message">
                    <b>✨ ¡Hola ${genero} ${primerNombre}!</b><br><br>
                    📧 <strong>${estadoEnvio}</strong><br>
                    📬 Se envió el usuario y la contraseña para las plataformas:<br>
                    <span style="background:#e8f0fe; padding:4px 12px; border-radius:20px; display:inline-block; font-size:0.75rem;">SIGA · KAWAK · SIPA HCM</span><br>
                    a tu correo institucional:<br>
                    <strong>${data.correo}</strong><br><br>
                    📌 Revisa tu bandeja de <strong>recibidos</strong>, o en <strong>spam</strong> o <strong>correo no deseado</strong>.<br>
                    ${mensajeAdicional}
                </div>
            </div>
            `;
            
            mostrarPreguntaFinal();
        } else {
            let mensajeError = data.mensaje || "❌ No encontramos ninguna cuenta con la cédula " + cedula;
            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
                <div class="message">
                    ${mensajeError}<br><br>
                    📞 Contacta a: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
                </div>
            </div>
            `;
        }
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(error => {
        document.getElementById("loading")?.remove();
        chat.innerHTML += `
        <div class="bot-message">
            <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
            <div class="message">
                ⚠️ Error de conexión. Intenta nuevamente.<br><br>
                Si el problema persiste, contacta a: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
            </div>
        </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CREDU - Asistente</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0b3c6f, #1e5fa3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    padding: 10px;
}

.chat-container {
    width: 100%;
    max-width: 450px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    overflow: hidden;
}

.chat-header {
    background: #0b3c6f;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

.chat-body {
    padding: 15px;
    height: 450px;
    overflow-y: auto;
    background: #f5f7fb;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.bot-message {
    display: flex;
    gap: 10px;
    align-items: flex-start;
}

.bot-message img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
}

.message {
    background: white;
    padding: 12px 15px;
    border-radius: 18px;
    max-width: 85%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    word-wrap: break-word;
    line-height: 1.4;
}

.user-message {
    text-align: right;
}

.user-bubble {
    display: inline-block;
    background: #0b3c6f;
    color: white;
    padding: 10px 16px;
    border-radius: 20px;
    max-width: 80%;
    word-wrap: break-word;
}

.alerta-personalizada {
    background: #fff3cd;
    border-left: 4px solid #ffc107;
    padding: 10px;
    margin-top: 12px;
    border-radius: 8px;
    font-size: 13px;
    color: #856404;
}

.chat-footer {
    display: flex;
    padding: 12px;
    background: white;
    border-top: 1px solid #e0e0e0;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.send-btn {
    background: #d4af37;
    border: none;
    padding: 12px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    color: #0b3c6f;
    font-size: 14px;
}

.send-btn:hover {
    background: #b8962e;
}

.footer-text {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: #888;
    background: white;
    border-top: 1px solid #eee;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
🎓 CREDU - Asistente Virtual
</div>

<div class="chat-body" id="chat">

<div class="bot-message">
<img src="/static/avatar.png">
<div class="message">
<b>👋 Hola, soy CREDU</b><br>
Te ayudo a obtener tus credenciales institucionales.<br><br>
📌 Por favor, ingresa tu número de cédula.
</div>
</div>

</div>

<div class="chat-footer">
<input type="text" id="cedula" placeholder="Ej: 12345678" autocomplete="off">
<button class="send-btn" onclick="enviarCedula()">➤ Enviar</button>
</div>

<div class="footer-text">
Uniagustiniana es creer en ti
</div>

</div>

<script>
function enviarCedula() {
    let cedula = document.getElementById("cedula").value.trim();
    let chat = document.getElementById("chat");

    if (cedula === "") {
        alert("Por favor ingresa tu cédula");
        return;
    }

    // Mensaje del usuario
    chat.innerHTML += `
    <div class="user-message">
        <div class="user-bubble">
            ${cedula}
        </div>
    </div>
    `;

    document.getElementById("cedula").value = "";

    // Indicador de carga
    chat.innerHTML += `
    <div class="bot-message" id="loading">
        <img src="/static/avatar.png">
        <div class="message">
            ⏳ Verificando...
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;

    // Enviar petición al backend
    fetch("/consultar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ cedula: cedula })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Error HTTP: " + response.status);
        }
        return response.json();
    })
    .then(data => {
        document.getElementById("loading")?.remove();

        if (data.success) {
            let mensajeAdicional = "";
            let estadoEnvio = data.enviado ? "✅ Correo enviado correctamente" : "⚠️ No se pudo enviar el correo. Contacta a Tecnologías.";
            
            if (data.personalizada) {
                mensajeAdicional = `
                <div class="alerta-personalizada">
                    ⚠️ <strong>Tu contraseña fue personalizada por ti mismo</strong><br><br>
                    En caso de que no la recuerdes, debes acercarte a la oficina de Tecnologías<br>
                    o escribir al correo:<br>
                    <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
                </div>
                `;
            }

            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png">
                <div class="message">
                    <b>✅ ¡Hola ${data.nombre}!</b><br><br>
                    📧 ${estadoEnvio}<br>
                    📬 Revisa tu correo: <strong>${data.correo}</strong><br><br>
                    <strong>🔐 Estas credenciales aplican para:</strong><br>
                    <b>SIGA - KAWAK - SIPA HCM</b>
                    ${mensajeAdicional}
                </div>
            </div>
            `;
        } else {
            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png">
                <div class="message">
                    ❌ No encontramos ninguna cuenta con la cédula <b>${cedula}</b><br><br>
                    Contacta a: <b>an.sistemasdeinformacion@uniagustiniana.edu.co</b>
                </div>
            </div>
            `;
        }
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(error => {
        document.getElementById("loading")?.remove();
        console.error("Error detallado:", error);
        chat.innerHTML += `
        <div class="bot-message">
            <img src="/static/avatar.png">
            <div class="message">
                ⚠️ Error de conexión. Intenta nuevamente.<br><br>
                <strong>Detalle técnico:</strong> ${error.message}<br><br>
                Si el problema persiste, contacta a: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
            </div>
        </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>

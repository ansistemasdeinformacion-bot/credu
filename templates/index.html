<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CREDU Chat</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0b3c6f, #1e5fa3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 380px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    overflow: hidden;
}

.chat-header {
    background: #0b3c6f;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat-body {
    padding: 15px;
    height: 350px;
    overflow-y: auto;
}

.bot-message {
    display: flex;
    margin-bottom: 15px;
}

.bot-message img {
    width: 50px;
    height: 50px;
    margin-right: 10px;
    border-radius: 50%;
}

.message {
    background: #f1f1f1;
    padding: 12px;
    border-radius: 12px;
    max-width: 75%;
}

.chat-footer {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.send-btn {
    background: #d4af37;
    border: none;
    margin-left: 5px;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
🎓 CREDU Asistente
</div>

<div class="chat-body" id="chat">

<div class="bot-message">
<img src="{{ url_for('static', filename='avatar.png') }}">
<div class="message">
Hola 👋, soy <b>CREDU</b><br>
Ingresa tu cédula para ayudarte con tus credenciales
</div>
</div>

</div>

<div class="chat-footer">
<input type="text" id="cedula" placeholder="Escribe tu cédula">
<button class="send-btn" onclick="enviarCedula()">➤</button>
</div>

</div>

<script>
function enviarCedula() {
    let cedula = document.getElementById("cedula").value;
    let chat = document.getElementById("chat");

    if (cedula === "") {
        alert("Ingresa tu cédula");
        return;
    }

    // Mensaje usuario
    chat.innerHTML += `
    <div style="text-align:right; margin-bottom:10px;">
        <div style="display:inline-block; background:#0b3c6f; color:white; padding:10px; border-radius:10px;">
            ${cedula}
        </div>
    </div>
    `;

    fetch("/consultar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ cedula: cedula })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        if (data.success) {
            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png">
                <div class="message">
                    👋 Hola <b>${data.nombre}</b><br><br>
                    📧 Tus credenciales serán enviadas a tu correo institucional:<br>
                    <b>${data.correo}</b><br><br>
                    🔐 Aplican para:<br>
                    SIGA - KAWAK - SIPA HCM
                </div>
            </div>
            `;
        } else {
            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png">
                <div class="message">
                    ❌ No encontramos esa cédula
                </div>
            </div>
            `;
        }

        chat.scrollTop = chat.scrollHeight;
    });

    document.getElementById("cedula").value = "";
}
</script>

</body>
</html>

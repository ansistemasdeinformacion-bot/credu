<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CREDU Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

```
    .chat-container {
        width: 350px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        overflow: hidden;
    }

    .chat-header {
        background: #003366;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .chat-body {
        padding: 15px;
        height: 300px;
        overflow-y: auto;
    }

    .bot-message {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    .bot-message img {
        width: 40px;
        margin-right: 10px;
    }

    .message {
        background: #e6e6e6;
        padding: 10px;
        border-radius: 10px;
    }

    .chat-footer {
        padding: 10px;
        text-align: center;
    }

    button {
        background: #003366;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
    }

    button:hover {
        background: #0055aa;
    }
</style>
```

</head>
<body>

<div class="chat-container">

```
<div class="chat-header">
    🎓 CREDU Asistente
</div>

<div class="chat-body" id="chat">

    <div class="bot-message">
        <img src="{{ url_for('static', filename='avatar.png') }}">
        <div class="message">
            Hola 👋, soy <b>CREDU</b><br>
            ¿Necesitas consultar tus credenciales institucionales?
        </div>
    </div>

</div>

<div class="chat-footer">
    <button onclick="responder()">Sí, necesito mis credenciales</button>
</div>
```

</div>

<script>
function responder() {
    const chat = document.getElementById("chat");

    chat.innerHTML += `
    <div class="bot-message">
        <img src="/static/avatar.png">
        <div class="message">
            Perfecto 👍<br>
            Ingresa tu número de documento en el sistema principal para enviarte las credenciales a tu correo institucional 📧
        </div>
    </div>
    `;
}
</script>

</body>
</html>

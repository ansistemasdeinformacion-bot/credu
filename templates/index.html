<!DOCTYPE html>
<html>
<head>
    <title>CREDU</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1F2A5A, #2E3E8C);
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        .icono {
            font-size: 50px;
            animation: flotar 2s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .logo {
            font-size: 40px;
            font-weight: bold;
            color: #D4A437;
            letter-spacing: 2px;
        }

        .subtitulo {
            font-size: 14px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .container {
            background: white;
            color: #333;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            animation: aparecer 0.8s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #D4A437;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background-color: #b8932f;
        }

        .footer {
            margin-top: 40px;
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
        }
    </style>
</head>

<body>

    <div class="icono">🎓</div>
    <div class="logo">CREDU</div>
    <div class="subtitulo">Sistema de Credenciales Uniagustiniana</div>

    <div class="container">

        <h3>Consultar mis credenciales</h3>

        <form action="/consultar" method="POST">
            <input type="text" name="cedula" placeholder="Ingrese su cédula" required>
            <button type="submit">Consultar</button>
        </form>

    </div>

    <div class="footer">
        Uniagustiniana es creer en ti
    </div>

</body>
</html>

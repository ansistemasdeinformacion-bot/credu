<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0a1f3e">
<title>CREDU · Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle at 10% 20%, #0a2a66, #020c1a, #010408);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    /* Mascota principal (esquina inferior derecha) */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('/static/mascota.png');
        background-repeat: no-repeat;
        background-position: bottom right;
        background-size: 280px;
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
        animation: floatMascota 6s ease-in-out infinite;
    }

    /* Segunda mascota (centro izquierdo) */
    body::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 5%;
        width: 150px;
        height: 150px;
        background-image: url('/static/mascota.png');
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        opacity: 0.1;
        pointer-events: none;
        z-index: 0;
        transform: translateY(-50%);
        animation: floatMascota2 7s ease-in-out infinite;
    }

    @keyframes floatMascota {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
    }

    @keyframes floatMascota2 {
        0%, 100% { transform: translateY(-50%) translateX(0px); }
        50% { transform: translateY(-50%) translateX(-10px); }
    }

    .floating-mortar {
        position: absolute;
        font-size: 100px;
        opacity: 0.06;
        pointer-events: none;
        animation: floatMortar 12s infinite ease-in-out;
        color: #d4af37;
        z-index: 0;
    }

    @keyframes floatMortar {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
    }

    .mortar-1 { top: 5%; right: 5%; font-size: 150px; animation-delay: 0s; }
    .mortar-2 { bottom: 15%; left: 5%; font-size: 120px; animation-delay: 2s; }
    .mortar-3 { top: 30%; right: 15%; font-size: 80px; animation-delay: 5s; }
    .mortar-4 { bottom: 30%; right: 20%; font-size: 100px; animation-delay: 8s; }

    .chat-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 520px;
        background: rgba(10, 31, 62, 0.55);
        backdrop-filter: blur(15px);
        border-radius: 40px;
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.35), 0 30px 50px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        animation: fadeInScale 0.7s ease;
        transition: transform 0.3s ease;
        border: 1px solid rgba(212, 175, 55, 0.4);
    }

    .chat-container:hover {
        transform: translateY(-5px);
    }

    @keyframes fadeInScale {
        from {
            opacity: 0;
            transform: scale(0.95) translateY(30px);
        }
        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .chat-header {
        background: linear-gradient(135deg, rgba(10, 42, 102, 0.95), rgba(13, 58, 138, 0.95));
        padding: 22px 20px;
        text-align: center;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .chat-header h1 {
        font-size: 1.6rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: white;
    }

    .chat-header p {
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 5px;
        letter-spacing: 0.5px;
    }

    .chat-body {
        padding: 20px;
        height: 470px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
        background: rgba(0, 0, 0, 0.2);
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }

    .chat-body::-webkit-scrollbar {
        width: 4px;
    }

    .chat-body::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
    }

    .chat-body::-webkit-scrollbar-thumb {
        background: #d4af37;
        border-radius: 10px;
    }

    .bot-message {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        animation: fadeInLeft 0.4s ease;
    }

    @keyframes fadeInLeft {
        from {
            opacity: 0;
            transform: translateX(-15px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .bot-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.5);
        flex-shrink: 0;
    }

    .message {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(4px);
        padding: 12px 16px;
        border-radius: 20px;
        border-top-left-radius: 5px;
        max-width: 82%;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        font-size: 0.85rem;
        line-height: 1.45;
        color: white;
        border: 1px solid rgba(212, 175, 55, 0.2);
        word-break: break-word;
    }

    .user-message {
        text-align: right;
        animation: fadeInRight 0.4s ease;
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(15px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .user-bubble {
        display: inline-block;
        background: linear-gradient(135deg, #d4af37, #b8962e);
        color: #0a1f3e;
        padding: 10px 18px;
        border-radius: 22px;
        border-top-right-radius: 5px;
        max-width: 82%;
        font-size: 0.85rem;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        word-break: break-word;
    }

    .button-group {
        display: flex;
        gap: 12px;
        margin-top: 15px;
        flex-wrap: wrap;
    }

    .btn-si, .btn-no {
        padding: 10px 22px;
        border-radius: 40px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.2s ease;
        min-width: 85px;
    }

    .btn-si {
        background: linear-gradient(135deg, #d4af37, #b8962e);
        color: #0a1f3e;
    }

    .btn-no {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .alerta-personalizada {
        background: rgba(254, 243, 199, 0.1);
        border-left: 3px solid #f59e0b;
        padding: 10px 12px;
        margin-top: 12px;
        border-radius: 12px;
        font-size: 0.7rem;
        color: #fde68a;
        backdrop-filter: blur(4px);
    }

    .chat-footer {
        display: flex;
        padding: 16px 20px;
        background: rgba(0, 0, 0, 0.3);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        gap: 10px;
    }

    .chat-footer input {
        flex: 1;
        padding: 13px 18px;
        border-radius: 60px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        font-size: 0.85rem;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.05);
        color: white;
    }

    .chat-footer input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .chat-footer input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        background: rgba(255, 255, 255, 0.1);
    }

    .send-btn {
        background: linear-gradient(135deg, #d4af37, #b8962e);
        border: none;
        padding: 12px 24px;
        border-radius: 60px;
        cursor: pointer;
        font-weight: 700;
        color: #0a1f3e;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        white-space: nowrap;
    }

    .footer-text {
        text-align: center;
        padding: 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #d4af37;
        background: rgba(0, 0, 0, 0.3);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        letter-spacing: 0.5px;
    }

    .loading-dots {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .loading-dots span {
        width: 7px;
        height: 7px;
        background: #d4af37;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 550px) {
        body::before {
            background-size: 180px;
        }
        body::after {
            width: 80px;
            height: 80px;
            left: 2%;
            opacity: 0.08;
        }
        .chat-header h1 { font-size: 1.3rem; }
        .chat-body { height: 450px; padding: 14px; }
        .bot-avatar { width: 36px; height: 36px; }
        .message, .user-bubble { max-width: 85%; font-size: 0.75rem; }
        .btn-si, .btn-no { padding: 8px 16px; font-size: 0.75rem; min-width: 70px; }
        .send-btn { padding: 10px 18px; font-size: 0.75rem; }
        .floating-mortar { font-size: 60px; }
        .mortar-1 { font-size: 100px; }
        .mortar-2 { font-size: 80px; }
    }
</style>
</head>
<body>

<div class="floating-mortar mortar-1">🎓</div>
<div class="floating-mortar mortar-2">🎓</div>
<div class="floating-mortar mortar-3">🎓</div>
<div class="floating-mortar mortar-4">🎓</div>

<div class="chat-container">

<div class="chat-header">
    <h1>🎓 CREDU</h1>
    <p>Asistente Virtual · Credenciales Uniagustiniana</p>
</div>

<div class="chat-body" id="chat">

<div class="bot-message">
    <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
    <div class="message">
        <b>✨ ¡Hola! Soy CREDU</b><br>
        Te ayudo a obtener tus credenciales institucionales.<br><br>
        📌 <strong>Ingresa tu número de cédula</strong>
    </div>
</div>

</div>

<div class="chat-footer">
    <input type="text" id="cedula" placeholder="🔢 Ej: 12345678" autocomplete="off" enterkeyhint="send">
    <button class="send-btn" onclick="enviarCedula()">📤 Enviar</button>
</div>

<div class="footer-text">
    ⚡ Uniagustiniana es creer en ti ⚡
</div>

</div>

<script>
let nombreCompleto = "";
let primerNombre = "";
let genero = "docente";

function obtenerPrimerNombre(nombreCompleto) {
    let partes = nombreCompleto.trim().split(" ");
    return partes[0];
}

function detectarGenero(nombreCompleto) {
    let nombre = obtenerPrimerNombre(nombreCompleto).toLowerCase();
    let femeninos = [
        "maria", "ana", "luz", "kelly", "andrea", "carolina", "lina", "paula",
        "diana", "claudia", "sandra", "patricia", "lorena", "martha", "gloria",
        "yolanda", "liliana", "angela", "monica", "johanna", "natalia", "viviana",
        "laura", "catalina", "daniela", "alejandra", "tatiana", "veronica",
        "beatriz", "eliana", "yuly", "leidy", "lizeth", "karen", "juliana",
        "estefania", "yessica", "dayana", "melissa", "valentina", "sofia",
        "camila", "valeria", "mariana", "isabella", "luciana", "fernanda",
        "julieta", "ximena", "adriana", "amanda", "zulma", "leonor", "mirta",
        "enith", "gladys", "yuby", "yuli", "yohanna", "isabel", "briggitte",
        "maribel", "yolima", "barbara", "esperanza", "solangel", "sonia", "hilda"
    ];
    return femeninos.includes(nombre) ? "estimada docente" : "estimado docente";
}

function mostrarPreguntaFinal() {
    let chat = document.getElementById("chat");
    let saludo = genero === "estimada docente" ? "profesora" : "profesor";
    
    chat.innerHTML += `
    <div class="bot-message" id="pregunta-final">
        <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
        <div class="message">
            🤝 <strong>¿Te puedo colaborar en algo más, ${saludo} ${primerNombre}?</strong>
            <div class="button-group">
                <button class="btn-si" onclick="respuestaSi()">✅ Sí</button>
                <button class="btn-no" onclick="respuestaNo()">❌ No</button>
            </div>
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;
}

function respuestaSi() {
    fetch("/logout", { method: "GET" })
    .then(() => {
        window.location.href = "/login";
    });
}

function respuestaNo() {
    let chat = document.getElementById("chat");
    document.getElementById("pregunta-final")?.remove();
    let despedida = genero === "estimada docente" ? "profesora" : "profesor";
    
    chat.innerHTML += `
    <div class="bot-message">
        <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
        <div class="message">
            👋 <strong>Fue un gusto ayudarte, ${despedida} ${primerNombre}.</strong><br><br>
            📌 Serás redirigido a la página de inicio en unos segundos...<br><br>
            ⚡ <em>Uniagustiniana es creer en ti</em>
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;
    
    document.getElementById("cedula").disabled = true;
    document.querySelector(".send-btn").disabled = true;
    
    setTimeout(function() {
        fetch("/logout", { method: "GET" })
        .then(() => {
            window.location.href = "/login";
        });
    }, 3000);
}

function enviarCedula() {
    let cedula = document.getElementById("cedula").value.trim();
    let chat = document.getElementById("chat");

    if (cedula === "") {
        alert("📌 Por favor ingresa tu cédula");
        return;
    }

    chat.innerHTML += `
    <div class="user-message">
        <div class="user-bubble">
            🔢 ${cedula}
        </div>
    </div>
    `;

    document.getElementById("cedula").value = "";

    chat.innerHTML += `
    <div class="bot-message" id="loading">
        <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
        <div class="message">
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>
    `;
    chat.scrollTop = chat.scrollHeight;

    fetch("/consultar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cedula: cedula })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("loading")?.remove();

        if (data.success) {
            nombreCompleto = data.nombre;
            primerNombre = obtenerPrimerNombre(nombreCompleto);
            genero = detectarGenero(nombreCompleto);
            
            let mensajeAdicional = "";
            let estadoEnvio = data.enviado ? "✅ Correo enviado correctamente" : "⚠️ No se pudo enviar el correo. Contacta a Tecnologías.";
            
            if (data.personalizada) {
                mensajeAdicional = `
                <div class="alerta-personalizada">
                    ⚠️ <strong>Tu contraseña fue personalizada por ti mismo</strong><br><br>
                    En caso de que no la recuerdes, debes acercarte a la oficina de Tecnologías<br>
                    o escribir al correo: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
                </div>
                `;
            }

            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
                <div class="message">
                    <b>✨ ¡Hola ${genero} ${primerNombre}!</b><br><br>
                    📧 <strong>${estadoEnvio}</strong><br>
                    📬 Se envió el usuario y la contraseña para las plataformas:<br>
                    <span style="background:rgba(212,175,55,0.2); padding:4px 12px; border-radius:20px; display:inline-block; font-size:0.7rem;">SIGA · KAWAK · SIPA HCM</span><br>
                    a tu correo institucional:<br>
                    <strong>${data.correo}</strong><br><br>
                    📌 Revisa tu bandeja de <strong>recibidos</strong>, o en <strong>spam</strong> o <strong>correo no deseado</strong>.<br>
                    ${mensajeAdicional}
                </div>
            </div>
            `;
            
            mostrarPreguntaFinal();
        } else {
            let mensajeError = data.mensaje || "❌ No encontramos ninguna cuenta con la cédula " + cedula;
            chat.innerHTML += `
            <div class="bot-message">
                <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
                <div class="message">
                    ${mensajeError}<br><br>
                    📞 Contacta a: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
                </div>
            </div>
            `;
        }
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(error => {
        document.getElementById("loading")?.remove();
        chat.innerHTML += `
        <div class="bot-message">
            <img src="/static/avatar.png" class="bot-avatar" alt="CREDU">
            <div class="message">
                ⚠️ Error de conexión. Intenta nuevamente.<br><br>
                Si el problema persiste, contacta a: <strong>an.sistemasdeinformacion@uniagustiniana.edu.co</strong>
            </div>
        </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>
